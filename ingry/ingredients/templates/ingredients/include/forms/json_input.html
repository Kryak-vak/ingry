<div class="mb-2">
    <label for="{{ field.id_for_label }}" class="form-label mb-0">{{ field.label }}</label>
    {{ field }}
    
    {% if field.errors %}
        <div class="text-danger">
            {% for error in field.errors %}
                <p>{{ error }}</p>
            {% endfor %}
        </div>
    {% endif %}
</div>
