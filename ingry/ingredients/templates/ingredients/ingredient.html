{% extends 'base.html' %}

{% block content %}
<h1>{{ ingredient.name }}</h1>

<div>{{ ingredient.id }}</div>
<div>{{ ingredient.slug }}</div>
<div>{{ ingredient.category }}</div>
<div>{{ ingredient.calories }}</div>
<img src="{{ ingredient.image.url }}">

<form class="container" method="get" action="/delete_ingredient/{{ ingredient.id }}">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Удалить ингредиент</button>
</form>
{% endblock %}
